<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no"
    />

    <script type="importmap">
      {
        "imports": {
          "eruda": "https://esm.sh/eruda",
          "lobster-wiki.js": "https://hacknock.github.io/lobster-wiki/lobster-wiki.js",
          "lobster.js": "https://hacknock.github.io/lobsterjs/lobster.js",
          "p5": "https://cdn.jsdelivr.net/npm/p5/+esm"
        }
      }
    </script>
    <script type="module">
      import eruda from 'eruda';
      eruda.init();
    </script>

    <style>
      body {
        line-break: strict;
        font-feature-settings: 'palt';
        overflow-wrap: anywhere;
      }
    </style>
    <style media="screen and (width <= 768px)">
      .lbw-main pre[class*='language-'],
      .lbw-main code[class*='language-'] {
        font-size: 0.8rem;
        line-height: 1.4;
      }
    </style>

    <link rel="stylesheet" href="https://hacknock.github.io/lobster-wiki/style.css" />

    <!-- Prism.js -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/prismjs/prism.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/prismjs/plugins/autoloader/prism-autoloader.min.js"></script>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/prismjs/plugins/line-numbers/prism-line-numbers.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/prismjs/plugins/line-numbers/prism-line-numbers.min.js"></script>

    <script type="module">
      import { initWiki } from 'lobster-wiki.js';

      // --- エントリポイントとSPA ライフサイクル
      setup();

      async function setup() {
        await initWiki('./wiki.config.json');

        const main = document.querySelector('.lbw-main');
        if (!main) {
          return;
        }

        const observer = new MutationObserver(updateDOM);

        async function updateDOM() {
          // 無限ループ防止のため、DOM操作中は監視を一時停止
          observer.disconnect();

          await processAllBlocks();

          // 展開完了のイベント発火
          document.dispatchEvent(new CustomEvent('wiki-page-rendered'));

          observer.observe(main, { childList: true, subtree: true });
        }

        // 初回実行
        await updateDOM();
      }

      // --- ブロック処理のオーケストレーション
      async function processAllBlocks() {
        const injectNodes = Array.from(document.querySelectorAll('.lbw-main code.language-inject'));
        const sourceNodes = Array.from(document.querySelectorAll('.lbw-main pre'));

        // Inject 展開とソースコードのfetch を並列で実行
        await Promise.all([...injectNodes.map(processInjectBlock), ...sourceNodes.map(processSourceImport)]);
      }

      // --- 個々のブロック処理ロジック
      // Inject ブロック展開(.js 実行 or HTML展開)
      async function processInjectBlock(codeNode, index) {
        const wrapper = codeNode.closest('.lbs-code-block');
        const filename = codeNode.closest('pre')?.getAttribute('data-filename');

        if (!wrapper) {
          return;
        }

        // note: 外部JSモジュールの実行
        if (filename?.endsWith('.js')) {
          const container = createContainer('custom-injected-module');
          wrapper.replaceWith(container);

          try {
            const module = await import(filename);

            // Markdown ブロック内の設定(JSON)をProps へ
            let props = {};
            const rawContent = codeNode.textContent.trim();
            if (rawContent.startsWith('{') || rawContent.startsWith('[')) {
              try {
                props = JSON.parse(rawContent);
                // props = new Function('return ' + rawContent)();
                // props = new Function(`return (${rawContent})`)();
              } catch (parseErr) {
                console.warn(`[Lobster Wiki] ${filename} に渡すJSONの解析に失敗しました:`, parseErr);
              }
            }

            // モジュールの default 関数に引数として、container, props を渡す
            module.default?.(container, props);
          } catch (err) {
            container.innerHTML = `<div style="color:red;">Error: ${filename} の実行に失敗しました</div>`;
            console.error(err);
          }
          return;
        }

        // note: Markdown ファイルの埋め込みレンダリング
        if (filename?.endsWith('.md')) {
          const container = createContainer('custom-injected-markdown');
          wrapper.replaceWith(container);

          try {
            const { loadMarkdown } = await import('lobster.js');

            await loadMarkdown(filename, container);
          } catch (err) {
            container.innerHTML = `<div style="color:red;">Error: ${filename} のレンダリングに失敗しました</div>`;
            console.error(err);
          }
          return;
        }

        // note: 外部HTML ファイル、またはインライン記述
        let rawContent = codeNode.textContent;
        if (filename) {
          try {
            const res = await fetch(filename);
            rawContent = res.ok
              ? await res.text()
              : `<div style="color:red;">Error: ${filename} の読み込みに失敗しました</div>`;
          } catch {
            rawContent = `<div style="color:red;">Error: ネットワークエラー</div>`;
          }
        }

        // UUIDの置換とコンテナの生成
        const uid = `inject-${Date.now()}-${index}`;
        const content = rawContent.replaceAll('__UUID__', uid);

        const container = createContainer('custom-injected-html', content);
        activateScripts(container);
        wrapper.replaceWith(container);
      }

      // note: 空のコードブロックへのソース自動取得(表示用)
      async function processSourceImport(preNode) {
        const codeNode = preNode.querySelector('code');
        const filename = preNode.getAttribute('data-filename');

        const isEmpty = codeNode?.textContent.trim() === '';
        const isPath = filename?.startsWith('./') || filename?.startsWith('/') || filename?.startsWith('http');

        if (!codeNode || !isEmpty || !isPath) {
          return;
        }

        try {
          const res = await fetch(filename);
          codeNode.textContent = res.ok
            ? await res.text()
            : `// Error: ${filename} の読み込みに失敗しました (${res.status})`;
        } catch {
          codeNode.textContent = `// Error: ネットワークエラー (${filename})`;
        }
      }

      // --- DOM操作ヘルパー (ノイズ除去)
      function createContainer(className, innerHTML = '') {
        const div = document.createElement('div');
        div.className = className;

        if (innerHTML) {
          div.innerHTML = innerHTML;
        }
        return div;
      }

      function activateScripts(container) {
        container.querySelectorAll('script').forEach((oldScript) => {
          const newScript = document.createElement('script');
          newScript.type = oldScript.getAttribute('type') || 'module';
          newScript.textContent = oldScript.textContent;
          oldScript.replaceWith(newScript);
        });
      }

      // --- プラグイン拡張領域
      document.addEventListener('wiki-page-rendered', () => {
        document.querySelectorAll('.lbw-main pre').forEach((pre) => {
          pre.classList.add('line-numbers');
        });

        window.Prism?.highlightAll();
      });
    </script>

    <title>lobster-wiki_sandbox</title>
  </head>
  <body></body>
</html>
